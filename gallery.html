<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - VajraCore Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #ff2e63; --bg: #0f1016; --text: #e0e0e0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-top: 100px; }
    header { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: rgba(15, 16, 22, 0.9); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
    nav a { color: var(--text); text-decoration: none; margin-left: 20px; font-size: 13px; text-transform: uppercase; font-weight: 600; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 5%; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .grid div { background: #1a1b25; height: 250px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
    .grid img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; opacity: 0.7; }
    .grid div:hover img { transform: scale(1.05); opacity: 1; }
  </style>
</head>
<body>
<header>
  <div class="logo" style="font-weight:800">VAJRACORE <span style="color:var(--primary)">ENGINEERING</span></div>
  <nav><a href="index.html">Home</a><a href="services.html">Services</a><a href="gallery.html" style="color:var(--primary)">Gallery</a><a href="career.html">Career</a><a href="contacts.html">Contacts</a></nav>
</header>
<div class="container">
  <h1 style="text-align:center; margin-bottom:50px;">Project Showcase</h1>
  <div class="grid">
    <div><img src="images/project1.jpg" alt="Site Work"></div>
    <div><img src="images/project2.jpg" alt="Core Cutting"></div>
    <div><img src="images/project3.jpg" alt="MEP Setup"></div>
    <div><img src="images/project4.jpg" alt="Chemical Cleaning"></div>
    <div><img src="images/project5.jpg" alt="Electrical Panel"></div>
    <div><img src="images/project6.jpg" alt="Deep Cleaning"></div>
  </div>
</div>
</body>
</html>
