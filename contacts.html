<style>
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
  .info-box { margin-bottom: 30px; }
  .info-box h4 { color: var(--primary-color); margin-bottom: 5px; text-transform: uppercase; font-size: 14px; }
  .info-box p { font-size: 15px; margin: 0; color: #fff; }
  input, textarea { width: 100%; background: #111; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 15px; font-family: inherit; }
  .btn-submit { background: var(--primary-color); border: none; padding: 15px 30px; font-weight: 800; cursor: pointer; width: 100%; }
</style>

<div class="container">
  <h2>Get In Touch</h2>
  <div class="contact-grid">
    <div>
      <div class="info-box">
        <h4>Our Office</h4>
        <p>Pune, Maharashtra, India</p>
      </div>
      <div class="info-box">
        <h4>Phone & WhatsApp</h4>
        <p>+91 99750 82204</p>
      </div>
      <div class="info-box">
        <h4>Email</h4>
        <p>contact@vajraengineering.com</p>
      </div>
    </div>
    <div>
      <form>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">
        <textarea rows="5" placeholder="Project Details"></textarea>
        <button type="submit" class="btn-submit">Send Inquiry</button>
      </form>
    </div>
  </div>
</div>
