<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | VajraCore Engineering</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #D4AF37; --bg: #0a0b10; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #cbd5e1; margin: 0; padding-top: 100px; }
    header { background: rgba(10, 11, 16, 0.98); display: flex; justify-content: space-between; align-items: center; padding: 0 6%; position: fixed; top: 0; width: 100%; height: 100px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); z-index: 1000; box-sizing: border-box; }
    
    .logo-text h1 { margin: 0; font-size: 20px; font-weight: 800; color: #fff; text-transform: uppercase; }
    .logo-text h1 span { color: var(--gold); }
    .logo-text p { margin: 2px 0 0 0; font-size: 8px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

    .contact-container { max-width: 1200px; margin: 0 auto; padding: 60px 6%; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
    .info-box h2 { color: #fff; text-transform: uppercase; }
    .info-box h2 span { color: var(--gold); }
    
    .contact-form { background: rgba(255,255,255,0.02); padding: 40px; border: 1px solid rgba(212, 175, 55, 0.1); }
    input, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); padding: 15px; color: #fff; margin-bottom: 20px; border-radius: 2px; }
    button { background: var(--gold); color: #000; border: none; padding: 15px 30px; font-weight: 800; text-transform: uppercase; cursor: pointer; width: 100%; }

    @media (max-width: 800px) {
      .contact-container { grid-template-columns: 1fr; }
      header { height: 80px; }
    }
  </style>
</head>
<body>
<header>
  <div class="logo-text">
    <h1>VAJRACORE <span>ENGINEERING</span></h1>
    <p>Engineering Services Pvt. Ltd.</p>
  </div>
  <nav style="display: flex; gap: 20px;">
    <a href="index.html" style="color: #fff; text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase;">Home</a>
    <a href="contacts.html" style="color: var(--gold); text-decoration: none; font-size: 11px; font-weight: 700; text-transform: uppercase;">Contacts</a>
  </nav>
</header>

<div class="contact-container">
  <div class="info-box">
    <h2>Get in <span>Touch</span></h2>
    <p><strong>Location:</strong> Pune, Maharashtra</p>
    <p><strong>Phone:</strong> +91 99750 82204</p>
    <p><strong>Email:</strong> info@vajracore.com</p>
  </div>
  <div class="contact-form">
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Email Address">
    <textarea rows="5" placeholder="Project Details"></textarea>
    <button>Send Message</button>
  </div>
</div>
</body>
</html>
